services:
  mongo:
    image: mongo:7
    container_name: baseapi-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: baseapi-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: baseapi-app
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      MONGODB_URL: mongodb://mongo:27017/${MONGO_DB:-baseapi}
      REDISCLOUD_HOST: redis
      REDISCLOUD_PORT: "6379"
      REDISCLOUD_KEY: ""
      PORT: "3000"
      SOCKET_PORT: "3000"
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  mongo-data:
  redis-data:
